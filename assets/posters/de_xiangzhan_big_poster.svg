<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15181f"/>
      <stop offset="60%" stop-color="#232a36"/>
      <stop offset="100%" stop-color="#3d2f2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff6a3d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- city silhouettes -->
  <g opacity="0.35" fill="#0f1218">
    <rect x="40" y="380" width="120" height="280"/>
    <rect x="180" y="320" width="150" height="340"/>
    <rect x="360" y="360" width="90" height="300"/>
    <rect x="500" y="290" width="160" height="370"/>
    <rect x="690" y="350" width="130" height="310"/>
    <rect x="860" y="260" width="180" height="400"/>
    <rect x="1070" y="340" width="120" height="320"/>
    <rect x="1220" y="300" width="150" height="360"/>
    <rect x="1400" y="370" width="120" height="290"/>
  </g>

  <!-- tactical grid -->
  <g opacity="0.1" stroke="#ffffff" stroke-width="1">
    <path d="M0 150 H1600 M0 300 H1600 M0 450 H1600 M0 600 H1600 M0 750 H1600"/>
    <path d="M200 0 V900 M400 0 V900 M600 0 V900 M800 0 V900 M1000 0 V900 M1200 0 V900 M1400 0 V900"/>
  </g>

  <!-- main frame -->
  <rect x="70" y="70" width="1460" height="760" fill="none" stroke="#f0f0f0" stroke-opacity="0.25" stroke-width="2"/>
  <rect x="90" y="90" width="1420" height="720" fill="none" stroke="url(#accent)" stroke-opacity="0.65" stroke-width="3"/>

  <g filter="url(#shadow)">
    <text x="120" y="210" fill="#f7f7f7" font-size="82" font-family="Arial, 'Microsoft YaHei', sans-serif" font-weight="900">CS1.6 巷战行动</text>
    <text x="120" y="282" fill="#ffb347" font-size="52" font-family="Arial, 'Microsoft YaHei', sans-serif" font-weight="800">de_xiangzhan_big</text>
  </g>

  <text x="120" y="350" fill="#d7dbe3" font-size="30" font-family="Arial, 'Microsoft YaHei', sans-serif">8K 级大地图 · 城市街区巷战 · 双爆破点节奏对抗</text>

  <!-- feature cards -->
  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="120" y="410" width="390" height="150" rx="16" fill="#111822" fill-opacity="0.82" stroke="#ffb347" stroke-opacity="0.55"/>
    <text x="150" y="462" fill="#ffb347" font-size="28" font-weight="700">大地图机动</text>
    <text x="150" y="500" fill="#f2f4f8" font-size="22">约 8192 × 8192 战斗空间</text>
    <text x="150" y="532" fill="#b9c0cc" font-size="20">长线转点 + 多路线推进</text>

    <rect x="560" y="410" width="390" height="150" rx="16" fill="#111822" fill-opacity="0.82" stroke="#ffb347" stroke-opacity="0.55"/>
    <text x="590" y="462" fill="#ffb347" font-size="28" font-weight="700">巷战火力线</text>
    <text x="590" y="500" fill="#f2f4f8" font-size="22">中路宽通道，近中距离交火</text>
    <text x="590" y="532" fill="#b9c0cc" font-size="20">掩体点位清晰，压枪友好</text>

    <rect x="1000" y="410" width="390" height="150" rx="16" fill="#111822" fill-opacity="0.82" stroke="#ffb347" stroke-opacity="0.55"/>
    <text x="1030" y="462" fill="#ffb347" font-size="28" font-weight="700">爆破对抗</text>
    <text x="1030" y="500" fill="#f2f4f8" font-size="22">A / B 双点进攻防守</text>
    <text x="1030" y="532" fill="#b9c0cc" font-size="20">适合 5v5 ~ 10v10 测试</text>
  </g>

  <!-- footer -->
  <rect x="0" y="820" width="1600" height="80" fill="#0a0d12" fill-opacity="0.75"/>
  <text x="120" y="870" fill="#e8ebf2" font-size="28" font-family="Arial, 'Microsoft YaHei', sans-serif" font-weight="700">下载地图源文件：maps/de_xiangzhan_big.map</text>
  <text x="1120" y="870" fill="#ff9f5a" font-size="24" font-family="Arial, 'Microsoft YaHei', sans-serif">GoldSrc / CS1.6</text>
</svg>
